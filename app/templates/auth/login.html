{% extends "base.html" %}

{% block title %}{{ t('login_title') }} — {{ t('nav_brand') }}{% endblock %}

{% block content %}
<h1>{{ t('login_title') }}</h1>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post" action="/auth/login">
    <div>
        <label for="username">{{ t('login_username') }}</label><br>
        <input
            type="text"
            id="username"
            name="username"
            value="{{ username or '' }}"
            autocomplete="username"
            required
        >
    </div>
    <div>
        <label for="password">{{ t('login_password') }}</label><br>
        <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
        >
    </div>
    <div>
        <button type="submit">{{ t('login_submit') }}</button>
    </div>
</form>
{% endblock %}
