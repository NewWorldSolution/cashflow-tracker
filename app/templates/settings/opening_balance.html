{% extends "base.html" %}

{% block title %}{{ t('settings_title') }} — {{ t('nav_brand') }}{% endblock %}

{% block content %}
<h1>{{ t('settings_title') }}</h1>
<p>{{ t('settings_description') }}</p>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post" action="/settings/opening-balance">
    <div>
        <label for="opening_balance">{{ t('settings_balance_label') }}</label><br>
        <input
            type="number"
            id="opening_balance"
            name="opening_balance"
            step="0.01"
            min="0.01"
            value="{{ current_balance if current_balance is not none else '' }}"
            required
        >
    </div>
    <br>
    <div>
        <label for="as_of_date">{{ t('settings_date_label') }}</label><br>
        <input
            type="date"
            id="as_of_date"
            name="as_of_date"
            value="{{ current_date }}"
            required
        >
    </div>
    <br>
    <button type="submit">{{ t('settings_save') }}</button>
</form>
{% endblock %}
